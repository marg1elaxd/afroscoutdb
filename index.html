<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE SIGHTINGS FILES — Scouting Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;900&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0D0B10; --panel:#17141C; --panel2:#1E1A26; --line:#2A2532;
  --pink:#FF2D87; --pink-soft:#FF7AB5; --pink-dim:#5c2040;
  --txt:#F2EEF4; --muted:#9A93A5; --ok:#39d98a; --warn:#ffb02e;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--txt);font-family:'Archivo',sans-serif;font-size:15px;line-height:1.5;min-height:100vh}
a{color:var(--pink-soft);text-decoration:none}
a:hover{text-decoration:underline}
.mono{font-family:'IBM Plex Mono',monospace}
h1,h2,h3{font-weight:900;letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer;border:none;border-radius:8px;font-size:14px}
input,select,textarea{font-family:inherit;font-size:15px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:9px 12px;width:100%}
input:focus,select:focus,textarea:focus{outline:2px solid var(--pink);outline-offset:0;border-color:var(--pink)}
textarea{min-height:84px;resize:vertical}
label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:12px 0 5px;font-weight:600}
.hint{font-size:12px;color:var(--pink-soft);margin-top:4px}
/* header */
header{position:sticky;top:0;z-index:50;background:rgba(13,11,16,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.hwrap{max-width:1100px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.wordmark{font-weight:900;font-size:17px;letter-spacing:.02em;color:var(--txt);white-space:nowrap}
.wordmark b{color:var(--pink)}
nav{display:flex;gap:4px;flex:1;min-width:0;overflow-x:auto}
nav a{padding:7px 12px;border-radius:8px;color:var(--muted);font-weight:600;font-size:14px;white-space:nowrap}
nav a.active{background:var(--panel2);color:var(--txt)}
.hbtns{display:flex;gap:8px;align-items:center}
.btn{background:var(--panel2);color:var(--txt);padding:8px 14px;font-weight:600;border:1px solid var(--line)}
.btn:hover{border-color:var(--pink)}
.btn.primary{background:var(--pink);color:#fff;border-color:var(--pink)}
.btn.primary:hover{background:#e0206f}
.btn.small{padding:5px 10px;font-size:12px}
.btn.danger{color:#ff6b6b}
/* layout */
main{max-width:1100px;margin:0 auto;padding:20px 16px 80px}
.pagehead{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:18px}
.pagehead h1{font-size:26px}
.count{color:var(--muted);font-size:14px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.toolbar>*{width:auto;flex:1;min-width:130px}
.toolbar input[type=search]{flex:2;min-width:180px}
/* cards */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px;display:flex;gap:12px;align-items:center;transition:border-color .15s}
.card:hover{border-color:var(--pink)}
.card .who{flex:1;min-width:0}
.card .who .nm{font-weight:700;font-size:15px;color:var(--txt);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .who .nm.wrap{white-space:normal;overflow:visible;text-overflow:unset;line-height:1.35}
.card .who .sub{font-size:12.5px;color:var(--muted)}
/* signature: R/P rating stub */
.stub{display:flex;flex-direction:column;align-items:center;background:var(--panel2);border:1px dashed var(--pink-dim);border-radius:8px;padding:5px 9px;min-width:52px}
.stub .rp{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:15px;color:var(--pink)}
.stub .lb{font-size:9px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
.badge{display:inline-block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:2px 8px;border-radius:99px;border:1px solid var(--line);color:var(--muted)}
.badge.watchlist{color:var(--muted)}
.badge.follow{color:var(--pink-soft);border-color:var(--pink-dim)}
.badge.recommend{color:var(--ok);border-color:#1d5c3f}
.badge.pass{color:#777}
.flag{font-size:18px}
/* panels */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:16px}
.panel h3{font-size:13px;text-transform:uppercase;letter-spacing:.1em;color:var(--pink);margin-bottom:10px}
.kv{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.kv div b{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600}
.kv div span{font-size:15px}
.evalblock p{white-space:pre-wrap;margin-bottom:8px}
.evalblock h4{font-size:13px;color:var(--pink-soft);margin:12px 0 4px;text-transform:uppercase;letter-spacing:.05em}
/* obs log */
.pre{white-space:pre-wrap}
.obs{border-left:3px solid var(--pink-dim);padding:10px 12px;margin-bottom:10px;background:var(--panel2);border-radius:0 8px 8px 0}
.obs .meta{font-size:12px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-bottom:4px}
.obs .stats{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--pink-soft)}
/* stats table */
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{text-align:left;padding:7px 8px;border-bottom:1px solid var(--line)}
th{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
td.num{font-family:'IBM Plex Mono',monospace}
/* combobox */
.combo{position:relative}
.combo .dd{position:absolute;top:100%;left:0;right:0;background:var(--panel2);border:1px solid var(--pink);border-radius:0 0 8px 8px;max-height:230px;overflow-y:auto;z-index:40;display:none}
.combo .dd div{padding:8px 12px;cursor:pointer;font-size:14px}
.combo .dd div:hover,.combo .dd div.sel{background:var(--pink-dim)}
.combo .dd .add{color:var(--pink);font-weight:700}
/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:22px;width:100%;max-width:520px}
.modal h2{font-size:19px;margin-bottom:6px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.dupwarn{background:#3a1420;border:1px solid #7d2140;border-radius:8px;padding:10px;margin-top:10px;font-size:13px}
/* note rows in match flow */
.noterow{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px}
.empty{border:1px dashed var(--line);border-radius:var(--radius);padding:34px;text-align:center;color:var(--muted)}
.empty b{color:var(--txt);display:block;margin-bottom:6px;font-size:16px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--pink);color:#fff;padding:10px 20px;border-radius:99px;font-weight:700;z-index:200;box-shadow:0 6px 24px rgba(255,45,135,.4)}
.demo-banner{background:var(--pink-dim);color:var(--pink-soft);text-align:center;font-size:12.5px;padding:6px 12px}
@media (max-width:640px){
  .row3{grid-template-columns:1fr 1fr}
  .pagehead h1{font-size:21px}
  nav{order:3;width:100%}
}
@media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>

function tagInput(container,{value,suggestions,max,placeholder}){
  const arr=[...(value||[])];
  container.innerHTML=`<div class="tags" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;border:1px solid var(--line);border-radius:10px;padding:6px 8px;background:var(--panel2)"></div><div class="dd" style="position:relative"></div>`;
  const tagsEl=container.querySelector('.tags'), ddEl=container.querySelector('.dd');
  const draw=()=>{
    tagsEl.innerHTML=arr.map((x,i)=>`<span style="display:inline-flex;align-items:center;gap:5px;border:1px solid var(--pink-dim);color:var(--pink-soft);border-radius:999px;padding:2px 9px;font-size:12px">${esc(x)}<button type="button" data-ti="${i}" style="background:none;border:none;color:var(--muted);cursor:pointer;padding:0;font-size:13px">✕</button></span>`).join('')
      +`<input type="text" placeholder="${esc(placeholder||'')}" style="flex:1;min-width:110px;border:none;background:none;padding:4px;margin:0">`;
    tagsEl.querySelectorAll('[data-ti]').forEach(b=>b.onclick=()=>{arr.splice(+b.dataset.ti,1);draw();});
    wire();
  };
  const add=x=>{x=x.trim();if(!x||arr.includes(x))return;
    if(max&&arr.length>=max){toast(t('maxSp'));return;}
    arr.push(x);draw();};
  function wire(){
    const inp=tagsEl.querySelector('input');
    inp.oninput=()=>{
      if(!suggestions){ddEl.innerHTML='';return;}
      const q=inp.value.trim().toLowerCase();
      if(!q){ddEl.innerHTML='';return;}
      const m=suggestions.filter(l=>l.toLowerCase().includes(q)&&!arr.includes(l)).slice(0,8);
      ddEl.innerHTML=m.length?`<div style="position:absolute;z-index:30;left:0;right:0;top:2px;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden">${m.map(l=>`<div data-sug style="padding:8px 12px;cursor:pointer;font-size:13px">${esc(l)}</div>`).join('')}</div>`:'';
      ddEl.querySelectorAll('[data-sug]').forEach(d=>d.onclick=()=>{add(d.textContent);ddEl.innerHTML='';tagsEl.querySelector('input').focus();});
    };
    inp.onkeydown=e=>{
      if(e.key==='Enter'){e.preventDefault();const first=ddEl.querySelector('[data-sug]');
        if(first&&suggestions){add(first.textContent);}else add(inp.value);
        ddEl.innerHTML='';}
      if(e.key==='Backspace'&&!inp.value&&arr.length){arr.pop();draw();}
    };
  }
  draw();
  return {get:()=>[...arr]};
}

/* ================= COMBOBOX (type-ahead ≥2 chars) ================= */
function combo(container,{placeholder,items,onPick,allowCreate,createLabel,value}){
  container.classList.add('combo');
  container.innerHTML=`<input type="text" placeholder="${esc(placeholder||t('typeToSearch'))}" value="${esc(value||'')}"><div class="dd"></div>`;
  const inp=container.querySelector('input'), dd=container.querySelector('.dd');
  let list=[];
  function show(q){
    const nq=norm(q);
    const toks=nq?nq.split(' '):[];
    list=(toks.length?items().filter(it=>{const k=norm(it.search||it.label);return toks.every(tk=>k.includes(tk));}):items()).slice(0,40);
    dd.innerHTML=list.map((it,i)=>`<div data-i="${i}">${it.html||esc(it.label)}</div>`).join('') +
      (allowCreate?`<div class="add" data-add>＋ ${t('createNew')} « ${esc(inp.value)} »</div>`:'');
    dd.style.display='block';
    dd.querySelectorAll('div[data-i]').forEach(d=>d.onclick=()=>{ const it=list[+d.dataset.i]; inp.value=it.label; dd.style.display='none'; onPick(it); });
    const add=dd.querySelector('[data-add]'); if(add) add.onclick=()=>{ dd.style.display='none'; allowCreate(inp.value); };
  }
  inp.addEventListener('input',()=>show(inp.value));
  inp.addEventListener('focus',()=>show(inp.value));
  document.addEventListener('click',e=>{ if(!container.contains(e.target)) dd.style.display='none'; });
  return { get:()=>inp.value, set:v=>inp.value=v, input:inp };
}

function countryCombo(el,{value,onPick,allowAll}){
  const items=()=>{
    const base=CAF.map(([cc])=>({label:cName(cc),value:cc,search:cSearch(cc),html:`${flag(cc)} ${cName(cc)}`}));
    return allowAll?[{label:t('allCountries'),value:'',search:norm(t('allCountries'))+' all tous',html:t('allCountries')},...base]:base;
  };
  return combo(el,{placeholder:t('typeToSearch'),items,onPick:it=>onPick(it.value,it.label),value:value?cName(value):''});
}

      (!f.scout||p.scout===f.scout)&&(!f.status||p.status===f.status));
    const so=state.sort||'edited';

    else if(so==='potBest') ps.sort((a,b)=>rk(a.potentiel,1)-rk(b.potentiel,1)||a.name.localeCompare(b.name));

   ${(()=>{const {avg,count}=averagedKpis(p.id,playerKpiPositions(p));
     if(!count) return '';
     const bar=v=>v==null?`<span class="mono" style="color:var(--muted)">—</span>`:`<div style="display:flex;align-items:center;gap:8px"><div style="flex:1;height:6px;background:var(--panel2);border-radius:3px;overflow:hidden"><div style="width:${v*10}%;height:100%;background:${v>=7?'var(--pink)':v>=5?'var(--pink-dim)':'var(--line)'}"></div></div><span class="mono" style="font-size:12px;min-width:30px;text-align:right">${v}</span></div>`;
     return `<div class="panel"><h3>${t('kpis')} <span class="mono" style="font-size:11px;color:var(--muted);text-transform:none;letter-spacing:0">· ${t('kpiAvgOf')} ${count} ${t('kpiEntries')}</span></h3>
       ${kpiGroups(playerKpiPositions(p)).map(([label,keys])=>`
         <div style="margin-top:10px"><div class="mono" style="font-size:11px;color:var(--pink);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">${esc(label)}</div>
         ${keys.map(k=>`<div style="display:grid;grid-template-columns:minmax(140px,1.3fr) 2fr;gap:10px;align-items:center;margin-bottom:3px"><span style="font-size:12.5px">${esc(k)}</span>${bar(avg[k])}</div>`).join('')}</div>`).join('')}
     </div>`;})()}
   <div class="panel"><h3>${t('obsLog')} (${notes.length})</h3>
     ${notes.length?notes.map(n=>`<div class="obs">
        <div class="meta" style="display:flex;align-items:center;gap:8px"><span>${fmtDate(n.m.match_date)} · <a href="#/match/${n.m.slug}">${teamDisplay(n.m.home_team)} vs ${teamDisplay(n.m.away_team)}</a> · ${esc(n.scout)}</span><span style="flex:1"></span>${state.unlocked?`<button class="btn small" data-en="${n.id}">✎</button><button class="btn small danger" data-dn="${n.id}">✕</button>`:''}</div>
        ${noteBody(n)}
        ${(n.minutes||n.goals||n.assists)?`<div class="stats">${n.minutes||0}' · ⚽ ${n.goals||0} · 🅰 ${n.assists||0}</div>`:''}
        ${n.video_url?`<div><a href="${esc(n.video_url)}" target="_blank" rel="noopener">▶ video</a></div>`:''}
      </div>`).join(''):`<div class="empty"><b>${t('noObs')}</b></div>`}</div>

   <div class="panel"><h3>${t('attachTitle')} (${atts.length})</h3>
     ${atts.map(a=>`<div class="obs"><div class="meta" style="display:flex;align-items:center;gap:8px"><span>${fmtDate(a.created_at)} · ${esc(a.scout||'')}</span><span style="flex:1"></span>${state.unlocked?`<button class="btn small danger" data-da="${a.id}">✕</button>`:''}</div>
       <a href="#" data-pdf="${a.id}">📄 ${esc(a.name)}</a></div>`).join('')||`<div class="empty">—</div>`}
     ${state.unlocked?`<label class="btn small" style="display:inline-flex;align-items:center;gap:6px;margin-top:8px;cursor:pointer">＋ PDF<input type="file" id="pdfUp" accept="application/pdf" style="display:none"></label>`:''}</div>

   ${(vids.length||hl.length)?`<div class="panel"><h3>${t('videos')}</h3>${hl.map(u=>`<div>▶ <a href="${esc(u)}" target="_blank" rel="noopener">${esc(u)}</a> <span class="mono" style="color:var(--pink);font-size:11px">HL</span></div>`).join('')}${vids.map(n=>`<div>▶ <a href="${esc(n.video_url)}" target="_blank" rel="noopener">${esc(n.video_url)}</a> <span class="mono" style="color:var(--muted);font-size:12px">${fmtDate(n.m.match_date)}</span></div>`).join('')}</div>`:''}`;
  $('#cpy').onclick=()=>{navigator.clipboard.writeText(location.href);toast(t('copied'));};
  $('#editBtn').onclick=()=>{ if(!requireUnlock())return; editPlayer(p); };
  wireNoteButtons();
  document.querySelectorAll('[data-pdf]').forEach(x=>x.onclick=e=>{e.preventDefault();const a=CACHE.attachments.find(z=>z.id===x.dataset.pdf);if(a)openDataUrl(a.data);});
  document.querySelectorAll('[data-da]').forEach(b=>b.onclick=async()=>{if(!confirm(t('confirmDelete')))return;await dbDelete('attachments',b.dataset.da);route();});
  const up=$('#pdfUp'); if(up) up.onchange=async ev=>{
    const f=ev.target.files[0]; if(!f)return;
    if(f.size>10*1024*1024){toast(t('fileTooBig'));return;}
    const data=await readFileAsDataURL(f);
    const r=await dbInsert('attachments',{player_id:p.id,name:f.name,data});
    if(r)route();
  };
}

        social_url:el.querySelector('#e_so').value.trim()||null,agent:el.querySelector('#e_ag').value.trim()||null};
      if(patch.birth_date) patch.birth_year=+patch.birth_date.slice(0,4);
      if(pKpiEd){
        const kv=pKpiEd.collect(); const ms=manualSnap();
        if(Object.keys(kv).length){
          if(ms){ const r=await dbUpdate('kpi_snapshots',ms.id,{kpis:kv}); if(r!==null) ms.kpis=kv; }

      }
      if((p.club_id||null)!==(eClubId||null) && p.club_id){
        const r0=await dbInsert('former_clubs',{player_id:p.id,club_id:p.club_id,period:null});
        if(r0) CACHE.former.push(r0);
      }
      await dbUpdate('players',p.id,patch); closeModal(); route();
    };
    el.querySelector('#e_del').onclick=async()=>{ if(!confirm(t('confirmDelete')))return; await dbDelete('players',p.id); closeModal(); nav('#/players'); };
  });
}

      return c.scope===model.scope;
    }).filter(c=>{if(seen.has(c.name))return false;seen.add(c.name);return true;})
      .map(c=>({label:c.name,search:`${norm(c.name)} ${c.country?cSearch(c.country):''}`,html:esc(c.name)}));
    const names=new Set(existing.map(e=>e.label));
    let pre=[];
    if(model.scope==='country'&&model.country) pre=[`${cName(model.country)}-1`,`${cName(model.country)} Cup`];
    if(model.scope==='continental') pre=CONT_COMPS;
    if(model.scope==='international') pre=INTL_COMPS;
    for(const n of pre) if(!names.has(n)) existing.push({label:n,pre:true,search:`${norm(n)} ${model.country?cSearch(model.country):''}`,html:`${esc(n)} <span style="color:var(--muted);font-size:11px">·</span>`});
    return existing;
  };
  let compCombo;
  function seasonItems(){
    const seasons=[...new Set(CACHE.comps.filter(c=>c.name===model.compName).map(c=>c.season).filter(Boolean))];
    for(const pre of ['26/27','25/26']) if(!seasons.includes(pre)) seasons.push(pre);
    return seasons.map(x=>({label:x,search:norm(x)+' '+x.replace('/',' ')}));
  }
  function mountSeason(){
    const w=$('#seasonWrap');
    if(!model.compName){w.style.display='none';return;}
    w.style.display='block';
    if(model.scope==='country'&&!model.season) model.season='26/27';
    combo($('#m_season'),{placeholder:'26/27…',items:seasonItems,
      onPick:it=>model.season=it.label,
      allowCreate:name=>{model.season=name.trim();$('#m_season input').value=name.trim();},
      value:model.season});
  }
  function mountComp(){
    const wrap=$('#compWrap'); wrap.style.display=model.scope==='friendly'?'none':'block';
    if(model.scope==='friendly'){model.competition_id=null;model.compName='';model.season='';mountSeason();return;}
    compCombo=combo($('#m_comp'),{placeholder:t('selectCompetition'),items:compItems,
      onPick:it=>{model.compName=it.label;model.season='';mountSeason();},
      allowCreate:name=>{model.compName=name.trim();compCombo.set(model.compName);model.season='';mountSeason();}});
    mountSeason();
  }
  async function resolveComp(){
    if(model.scope==='friendly'||!model.compName) return null;
    const season=(model.season||'').trim()||null;
    const found=CACHE.comps.find(c=>c.name===model.compName&&(c.season||null)===season&&c.scope===model.scope);
    if(found) return found.id;
    const c=await dbInsert('competitions',{slug:uniqSlug(slugify(model.compName+(season?'-'+season:'')),CACHE.comps),name:model.compName,season,scope:model.scope,country:model.scope==='country'?model.country:null});
    if(c){CACHE.comps.push(c);CACHE.compById[c.id]=c;return c.id;}
    return null;
  }
  /* team combos: national teams + clubs + quick-add */
  const teamItems=()=>{
    const nats=NAT_TEAMS.map(nt=>{ const m=nt.key.match(/^([A-Z]{2})(?:-(U\d+))?$/); const cc=m?m[1]:'', age=m&&m[2]?m[2]:'';
      return {label:natTeamName(nt.key).replace(/^\S+\s/,''),value:nt.key,search:`${cSearch(cc)} ${age.toLowerCase()}`,html:natTeamName(nt.key)}; });
    const clubs=CACHE.clubs.map(c=>({label:c.name,value:'club:'+c.id,search:`${norm(c.name)} ${cSearch(c.country||'')}`,html:`${flag(c.country)} ${esc(c.name)} <span style="color:var(--muted);font-size:11px">club</span>`}));
    return [...clubs,...nats];
  };
  function mountTeam(sel,key){
    combo($(sel),{placeholder:t('selectTeam'),items:teamItems,
      onPick:it=>model[key]=it.value,
      allowCreate:async name=>{ // quick-add club; country only known when scope=country
        const club=await dbInsert('clubs',{slug:uniqSlug(slugify(name),CACHE.clubs),name,country:model.scope==='country'?model.country:null});
        if(club){CACHE.clubs.push(club);CACHE.clubById[club.id]=club;model[key]='club:'+club.id;$(sel+' input').value=name;}
      }});
  }
  const scopeHint=()=>{$('#scopeHint').textContent={country:t('hintCountry'),continental:t('hintCont'),international:t('hintIntl'),friendly:''}[model.scope]||'';};
  mountComp(); mountTeam('#m_home','home'); mountTeam('#m_away','away'); scopeHint();
  $('#m_scope').onchange=e=>{model.scope=e.target.value;model.competition_id=null;
    $('#ccWrap').style.display=model.scope==='country'?'block':'none'; mountComp(); scopeHint();};
  countryCombo($('#m_cc'),{value:model.country,onPick:v=>{model.country=v;model.competition_id=null;mountComp();}});

  /* line-up images (max 4, held until save) */
  function drawImgs(){
    $('#imgPrev').innerHTML=model.images.map((d,i)=>`<div style="position:relative"><img src="${d}" style="width:86px;height:86px;object-fit:cover;border-radius:8px;border:1px solid var(--line)"><button class="btn small danger" data-rmimg="${i}" style="position:absolute;top:-6px;right:-6px">✕</button></div>`).join('');
    $('#imgPrev').querySelectorAll('[data-rmimg]').forEach(b=>b.onclick=()=>{model.images.splice(+b.dataset.rmimg,1);drawImgs();});
  }
  $('#m_imgs').onchange=async ev=>{
    for(const f of [...ev.target.files]){
      if(model.images.length>=4){toast(t('maxImgs'));break;}
      model.images.push(await resizePhoto(f,1200));
    }
    ev.target.value=''; drawImgs();
  };

  /* player notes */
  function drawNotes(){
    const list=$('#noteList');
    list.innerHTML=model.notes.map((n,i)=>{
      const p=CACHE.playerById[n.player_id];
      return `<div class="noterow">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <b>${flag(p.country)} ${esc(p.name)}</b>
          <button class="btn small danger" data-del="${i}">✕</button></div>
        <div class="row3">
          <div><label>${t('pos1')} *</label><input data-p1="${i}" value="${esc(n.p1||'')}" placeholder="CB"></div>
          <div><label>${t('pos2')}</label><input data-p2="${i}" value="${esc(n.p2||'')}"></div>
          <div><label>${t('pos3')}</label><input data-p3="${i}" value="${esc(n.p3||'')}"></div>
        </div>
        <label>${t('generalNote')}</label><textarea data-note="${i}">${esc(n.note)}</textarea>
        <button type="button" class="btn small" data-ktoggle="${i}" style="margin:6px 0 2px">${t('kpiToggle')}</button>
        <div data-kwrap="${i}" style="display:none"></div>
        <div class="row2">
          <div><label>${t('technique')}</label><textarea data-c4="${i}:note_technique">${esc(n.note_technique||'')}</textarea></div>
          <div><label>${t('tactique')}</label><textarea data-c4="${i}:note_tactique">${esc(n.note_tactique||'')}</textarea></div>
          <div><label>${t('mental')}</label><textarea data-c4="${i}:note_mental">${esc(n.note_mental||'')}</textarea></div>
          <div><label>${t('athletique')}</label><textarea data-c4="${i}:note_athletique">${esc(n.note_athletique||'')}</textarea></div>
        </div>
        <div class="row3">
          <div><label>${t('min')}</label><input type="number" data-min="${i}" value="${n.minutes??''}"></div>
          <div><label>${t('goals')}</label><input type="number" data-g="${i}" value="${n.goals??''}"></div>
          <div><label>${t('assists')}</label><input type="number" data-a="${i}" value="${n.assists??''}"></div>
        </div>
        <label>${t('highlights')}</label><input data-v="${i}" value="${esc(n.video_url||'')}">
      </div>`;
    }).join('');
    list.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{model.notes.splice(+b.dataset.del,1);drawNotes();});
    list.querySelectorAll('[data-note]').forEach(x=>x.oninput=()=>model.notes[+x.dataset.note].note=x.value);
    list.querySelectorAll('[data-c4]').forEach(x=>{const [i,k]=x.dataset.c4.split(':');x.oninput=()=>model.notes[+i][k]=x.value;});
    list.querySelectorAll('[data-p1]').forEach(x=>x.oninput=()=>model.notes[+x.dataset.p1].p1=x.value);
    list.querySelectorAll('[data-p2]').forEach(x=>x.oninput=()=>model.notes[+x.dataset.p2].p2=x.value);
    list.querySelectorAll('[data-p3]').forEach(x=>x.oninput=()=>model.notes[+x.dataset.p3].p3=x.value);
    list.querySelectorAll('[data-ktoggle]').forEach(b=>b.onclick=()=>{
      const i=+b.dataset.ktoggle, w=list.querySelector(`[data-kwrap="${i}"]`);
      if(w.style.display==='none'){
        w.style.display='block';
        const pl=CACHE.playerById[model.notes[i].player_id]||{};
        const pos=[...new Set([...playerKpiPositions(pl),model.notes[i].p1,model.notes[i].p2,model.notes[i].p3].map(x=>typeof x==='string'?POS_NORM(x):x).filter(Boolean))];
        model.notes[i]._kpiEd=mountKpiEditor(w,pos.length?pos:playerKpiPositions(pl),model.notes[i].kpis||null);
      } else { w.style.display='none'; }
    });
    list.querySelectorAll('[data-min]').forEach(x=>x.oninput=()=>model.notes[+x.dataset.min].minutes=+x.value||null);
    list.querySelectorAll('[data-g]').forEach(x=>x.oninput=()=>model.notes[+x.dataset.g].goals=+x.value||null);
    list.querySelectorAll('[data-a]').forEach(x=>x.oninput=()=>model.notes[+x.dataset.a].assists=+x.value||null);
    list.querySelectorAll('[data-v]').forEach(x=>x.oninput=()=>model.notes[+x.dataset.v].video_url=x.value);
  }
  $('#addNote').onclick=()=>{
    modal(`<h2>${t('selectPlayer')}</h2><div id="pp"></div>
      <div class="actions"><button class="btn" data-close>${t('cancel')}</button></div>`,
    el=>{ combo(el.querySelector('#pp'),{placeholder:t('typeToSearch'),
        items:()=>CACHE.players.map(p=>({label:p.name,id:p.id,html:`${flag(p.country)} ${esc(p.name)} <span style="color:var(--muted);font-size:11px">${esc(p.position||'')} ${p.birth_year||''}</span>`})),
        onPick:it=>{const pl=CACHE.playerById[it.id];model.notes.push({player_id:it.id,p1:(pl&&pl.position)||'',p2:'',p3:'',note:'',note_technique:'',note_tactique:'',note_mental:'',note_athletique:'',minutes:null,goals:null,assists:null,video_url:''});closeModal();drawNotes();},
        allowCreate:name=>{closeModal();quickAddPlayer(p=>{model.notes.push({player_id:p.id,p1:p.position||'',p2:'',p3:'',note:'',note_technique:'',note_tactique:'',note_mental:'',note_athletique:'',minutes:null,goals:null,assists:null,video_url:''});drawNotes();},name);}});
      el.querySelector('#pp input').focus();
    });
  };
  $('#m_save').onclick=async()=>{
    const date=parseDDMM($('#m_date').value);
    if(!model.home||!model.away||!date){toast(t('saveFirst'));return;}
    if(model.notes.some(n=>!(n.p1||'').trim())){toast(t('posRequired'));return;}
    model.competition_id=await resolveComp();
    const slugBase=`${date}-${slugify(teamDisplay(model.home))}-vs-${slugify(teamDisplay(model.away))}`;
    const m=await dbInsert('match_reports',{slug:uniqSlug(slugBase,CACHE.matches),competition_id:model.competition_id,
      home_team:model.home,away_team:model.away,match_date:date,general_notes:$('#m_gen').value,video_url:$('#m_video').value.trim()||null});
    if(!m)return;
    for(const d of model.images) await dbInsert('match_images',{match_report_id:m.id,data:d});
    for(const n of model.notes) await dbInsert('player_notes',{match_report_id:m.id,player_id:n.player_id,kpis:n._kpiEd?n._kpiEd.collect():(n.kpis||null),positions_played:[n.p1,n.p2,n.p3].map(x=>(x||'').trim()).filter(Boolean).join(', '),note:n.note,note_technique:n.note_technique||null,note_tactique:n.note_tactique||null,note_mental:n.note_mental||null,note_athletique:n.note_athletique||null,minutes:n.minutes,goals:n.goals,assists:n.assists,video_url:n.video_url});
    nav('#/match/'+m.slug);
  };
}

  const eM=$('#editM'); if(eM) eM.onclick=()=>editMatchModal(m);
  document.querySelectorAll('[data-mimg]').forEach(im=>im.onclick=()=>{const x=CACHE.matchImages.find(z=>z.id===im.dataset.mimg);if(x)openDataUrl(x.data);});
  document.querySelectorAll('[data-dmimg]').forEach(b=>b.onclick=async()=>{if(!confirm(t('confirmDelete')))return;await dbDelete('match_images',b.dataset.dmimg);route();});
  const miu=$('#mImgUp'); if(miu) miu.onchange=async ev=>{
    const cur=(CACHE.matchImages||[]).filter(x=>x.match_report_id===m.id).length;
    let room=4-cur;
    for(const f of [...ev.target.files]){ if(room<=0){toast(t('maxImgs'));break;} await dbInsert('match_images',{match_report_id:m.id,data:await resizePhoto(f,1200)}); room--; }
    route();
  };
  $('#cpy').onclick=()=>{navigator.clipboard.writeText(location.href);toast(t('copied'));};
  const del=$('#delM'); if(del) del.onclick=async()=>{ if(!confirm(t('confirmDelete')))return; await dbDelete('match_reports',m.id); nav('#/matches'); };
}

/* ================= VIEW: COMPETITIONS (coverage map) ================= */
async function viewCompetitions(){
  await loadAll();
  const rows=CACHE.comps.map(c=>{
    const ms=CACHE.matches.filter(m=>m.competition_id===c.id);
    const ns=CACHE.notes.filter(n=>ms.some(m=>m.id===n.match_report_id));
    return {c,matches:ms.length,players:new Set(ns.map(n=>n.player_id)).size,scouts:new Set(ms.map(m=>m.scout)).size};
  });
  /* group by scope+name; seasons become rows inside the group card */
  const groups={};
  for(const r of rows){ const k=r.c.scope+'|'+r.c.name; (groups[k]=groups[k]||{name:r.c.name,scope:r.c.scope,country:r.c.country,items:[]}).items.push(r); }
  const gl=Object.values(groups).sort((a,b)=>b.items.reduce((x,r)=>x+r.matches,0)-a.items.reduce((x,r)=>x+r.matches,0)||a.name.localeCompare(b.name));
  for(const g of gl) g.items.sort((a,b)=>(b.c.season||'').localeCompare(a.c.season||''));
  $('#app').innerHTML=`
   <div class="pagehead"><h1>${t('competitions')}</h1><span class="count">${gl.length}</span><span style="flex:1"></span>
     ${state.unlocked?`<button class="btn primary" id="newC">${t('newComp')}</button>`:''}</div>
   ${gl.length?`<div class="grid">${gl.map(g=>`<div class="card" style="flex-direction:column;align-items:stretch;gap:8px">
      <span class="nm" style="font-weight:700">${g.scope==='country'?flag(g.country):'🌍'} ${esc(g.name)}</span>
      ${g.items.map(r=>`<a href="#/competition/${r.c.slug}" style="display:flex;justify-content:space-between;align-items:center;gap:18px;background:var(--panel2);border-radius:8px;padding:9px 14px">
        <span class="mono" style="font-size:13px;flex-shrink:0">${esc(r.c.season||'—')}</span>
        <span class="sub mono" style="text-align:right;white-space:nowrap">${r.matches?`${r.matches} ${t('matchesN')[0].toUpperCase()} · ${r.players} ${t('playersNoted')[0].toUpperCase()}`:`0 ${t('matchesN')[0].toUpperCase()} · ${t('planned')}`}</span></a>`).join('')}
    </div>`).join('')}</div>`
   :`<div class="empty"><b>${t('emptyComps')}</b>${t('emptyCompsSub')}</div>`}`;
  const nc=$('#newC'); if(nc) nc.onclick=()=>{
    let scope='country', cc='', season='26/27';
    modal(`<h2>${t('newComp').replace('+ ','')}</h2>
      <label>${t('scope')}</label>
      <select id="nc_scope"><option value="country">${t('scopeCountry')}</option><option value="continental">${t('scopeCont')}</option>
        <option value="international">${t('scopeIntl')}</option></select>
      <div id="nc_ccw"><label>${t('country')}</label><div id="nc_cc2"></div></div>
      <label>${t('name')} *</label><input id="nc_nm" placeholder="Ghana-1, CAF WCL…">
      <label>${t('season')}</label><input id="nc_ss" value="26/27" style="max-width:140px">
      <label>${t('compInfo')}</label><textarea id="nc_info" rows="5"></textarea>
      <div class="actions"><button class="btn" data-close>${t('cancel')}</button><button class="btn primary" id="nc_ok2">${t('save')}</button></div>`,
    el=>{
      countryCombo(el.querySelector('#nc_cc2'),{value:'',onPick:v=>cc=v});
      el.querySelector('#nc_scope').onchange=e=>{scope=e.target.value;el.querySelector('#nc_ccw').style.display=scope==='country'?'block':'none';
        const ss=el.querySelector('#nc_ss'); if(scope!=='country'&&ss.value==='26/27') ss.value='';};
      el.querySelector('#nc_ok2').onclick=async()=>{
        const name=el.querySelector('#nc_nm').value.trim(); if(!name)return;
        if(scope==='country'&&!cc){toast(t('countryRequired'));return;}
        const season=el.querySelector('#nc_ss').value.trim()||null;
        const c=await dbInsert('competitions',{slug:uniqSlug(slugify(name+(season?'-'+season:'')),CACHE.comps),name,season,scope,country:scope==='country'?cc:null,info:el.querySelector('#nc_info').value.trim()||null});
        if(c){CACHE.comps.push(c);CACHE.compById[c.id]=c;closeModal();route();}
      };
    });
  };
}
async function viewCompetition(slug){
  await loadAll();
  const c=CACHE.comps.find(x=>x.slug===slug);
  if(!c){$('#app').innerHTML='<div class="empty">404</div>';return;}
  const ms=CACHE.matches.filter(m=>m.competition_id===c.id).sort((a,b)=>b.match_date.localeCompare(a.match_date));
  const ns=CACHE.notes.filter(n=>ms.some(m=>m.id===n.match_report_id));
  const players=[...new Set(ns.map(n=>n.player_id))].map(id=>CACHE.playerById[id]).filter(Boolean);
  const teams=[...new Set(ms.flatMap(m=>[m.home_team,m.away_team]))];
  $('#app').innerHTML=`
   <div class="pagehead"><h1>${esc(compLabel(c))}</h1><span style="flex:1"></span><button class="btn small" id="cpy">${t('copyLink')}</button>${state.unlocked?`<button class="btn small" id="editC">✎ ${t('editComp')}</button><button class="btn small danger" id="delC">${t('delete')}</button>`:''}</div>
   ${c.info?`<div class="panel"><p class="pre" style="margin:0">${linkify(esc(c.info))}</p></div>`:''}
   <div class="panel"><h3>${t('coverage')}</h3><div class="kv">
     <div><b>${t('matchesN')}</b><span class="mono">${ms.length}</span></div>
     <div><b>${t('teamsSeen')}</b><span class="mono">${teams.length}</span></div>
     <div><b>${t('playersNoted')}</b><span class="mono">${players.length}</span></div>
   </div><p style="margin-top:10px">${teams.map(teamLink).join(' · ')}</p></div>
   <div class="panel"><h3>${t('matchesN')}</h3>
     ${ms.map(m=>`<div class="obs"><div class="meta">${fmtDate(m.match_date)} · ${esc(m.scout)}</div>
       <a href="#/match/${m.slug}">${teamDisplay(m.home_team)} vs ${teamDisplay(m.away_team)}</a></div>`).join('')}</div>
   <div class="panel"><h3>${t('playersNoted')}</h3><div class="grid">
     ${players.map(p=>`<a class="card" href="#/player/${p.slug}"><span class="flag">${flag(p.country)}</span>
       <span class="who"><span class="nm">${esc(p.name)}</span><span class="sub">${esc(p.position||'')} ${p.birth_year||''}</span></span></a>`).join('')}</div></div>`;
  $('#cpy').onclick=()=>{navigator.clipboard.writeText(location.href);toast(t('copied'));};
  const dC=$('#delC'); if(dC) dC.onclick=async()=>{
    if(ms.length){toast(t('cantDeleteComp'));return;}
    if(!confirm(t('confirmDelete')))return;
    await dbDelete('competitions',c.id); nav('#/competitions');
  };
  const eC=$('#editC'); if(eC) eC.onclick=()=>{
    modal(`<h2>${t('editComp')}</h2>
      <label>${t('name')}</label><input id="ec_name" value="${esc(c.name)}">
      <label>${t('season')}</label><input id="ec_season" value="${esc(c.season||'')}" placeholder="26/27" style="max-width:140px">
      <label>${t('compInfo')}</label><textarea id="ec_info" rows="6" placeholder="https://…\nDomi couvre le sud, Salah le nord…">${esc(c.info||'')}</textarea>
      <div class="actions"><button class="btn" data-close>${t('cancel')}</button><button class="btn primary" id="ec_ok">${t('save')}</button></div>`,
    el=>{
      el.querySelector('#ec_ok').onclick=async()=>{
        const patch={name:el.querySelector('#ec_name').value.trim()||c.name,season:el.querySelector('#ec_season').value.trim()||null,info:el.querySelector('#ec_info').value.trim()||null};
        const r=await dbUpdate('competitions',c.id,patch);
        if(r!==null){Object.assign(c,patch);closeModal();route();}
      };
    });
  };
}

function clubModal(c,done){
  const F=k=>esc((c&&c[k])||'');
  let cc=(c&&c.country)||'', badge=(c&&c.badge)||'';
  modal(`<h2>${c?'✎ '+esc(c.name):t('newClub').replace('+ ','')}</h2>
    <label>${t('name')} *</label><input id="cl_nm" value="${F('name')}">
    <div class="row3">
      <div><label>${t('country')}</label><div id="cl_cc"></div></div>
      <div><label>${t('tier')}</label><input id="cl_tier" value="${F('tier')}" placeholder="1, 2, D1…"></div>
      <div><label>${t('city')}</label><input id="cl_city" value="${F('city')}"></div>
    </div>
    <label>${t('clubLevel')}</label>
    <select id="cl_lvl" style="max-width:140px"><option value="">—</option>${[1,2,3,4,5,6,7,8].map(v=>`<option value="${v}" ${c&&c.level===v?'selected':''}>${v}</option>`).join('')}</select>
    <div class="hint">${t('ratingHint')}</div>
    <label>${t('badge')}</label><input id="cl_badge" type="file" accept="image/*">
    <div id="cl_bprev" style="margin-top:6px">${badge?`<img src="${badge}" style="width:56px;height:56px;object-fit:contain;border-radius:8px;background:var(--panel2)">`:''}</div>
    <label>${t('clubInfo')}</label><textarea id="cl_info" rows="5">${F('info')}</textarea>
    <div class="actions"><button class="btn" data-close>${t('cancel')}</button><button class="btn primary" id="cl_ok">${t('save')}</button></div>`,
  el=>{
    countryCombo(el.querySelector('#cl_cc'),{value:cc,onPick:v=>cc=v});
    el.querySelector('#cl_badge').onchange=async ev=>{const f=ev.target.files[0];if(!f)return;badge=await resizePhoto(f,200);
      el.querySelector('#cl_bprev').innerHTML=`<img src="${badge}" style="width:56px;height:56px;object-fit:contain;border-radius:8px;background:var(--panel2)">`;};
    el.querySelector('#cl_ok').onclick=async()=>{
      const name=el.querySelector('#cl_nm').value.trim(); if(!name)return;
      const data={name,country:cc||null,tier:el.querySelector('#cl_tier').value.trim()||null,
        city:el.querySelector('#cl_city').value.trim()||null,level:+el.querySelector('#cl_lvl').value||null,
        badge:badge||null,info:el.querySelector('#cl_info').value.trim()||null};
      if(c){ const r=await dbUpdate('clubs',c.id,data); if(r!==null){Object.assign(c,data);closeModal();route();} }
      else { const r=await dbInsert('clubs',{...data,slug:uniqSlug(slugify(name),CACHE.clubs)});
        if(r){CACHE.clubs.push(r);CACHE.clubById[r.id]=r;closeModal(); if(done)done(r); else route();} }
    };
  });
}
async function viewClubs(){
  await loadAll();
  let q='';
  const draw=()=>{
    const cs=CACHE.clubs.filter(c=>!q||norm(c.name+' '+(c.city||'')).includes(norm(q))||cSearch(c.country||'').includes(norm(q)))
      .sort((a,b)=>a.name.localeCompare(b.name));
    $('#cgrid').innerHTML=cs.length?cs.map(c=>`<a class="card" href="#/club/${c.slug}">
      <span class="flag">${c.badge?`<img src="${c.badge}" style="width:34px;height:34px;object-fit:contain;border-radius:6px;background:var(--panel2)">`:flag(c.country)}</span>
      <span class="who"><span class="nm">${esc(c.name)}</span>
        <span class="sub">${[cName(c.country||'')||null,c.tier?'T'+esc(c.tier):null,c.city?esc(c.city):null].filter(Boolean).join(' · ')||'—'}</span></span>
      ${c.level?`<span class="stub"><span class="rp">${c.level}</span><span class="lb">1–8</span></span>`:''}</a>`).join('')
      :`<div class="empty">—</div>`;
    $('#ccnt').textContent=cs.length;
  };
  $('#app').innerHTML=`
   <div class="pagehead"><h1>${t('clubs')}</h1><span class="count" id="ccnt"></span><span style="flex:1"></span>
     ${state.unlocked?`<button class="btn primary" id="newCl">${t('newClub')}</button>`:''}</div>
   <div class="filters"><input id="cq" placeholder="${t('typeToSearch')}" style="max-width:280px"></div>
   <div class="grid" id="cgrid"></div>`;
  $('#cq').oninput=e=>{q=e.target.value;draw();};
  const b=$('#newCl'); if(b) b.onclick=()=>clubModal(null);
  draw();
}

/* ================= VIEW: CLUB ================= */
async function viewClub(slug){
  await loadAll();
  const c=CACHE.clubs.find(x=>x.slug===slug);
  if(!c){$('#app').innerHTML='<div class="empty">404</div>';return;}
  const roster=CACHE.players.filter(p=>p.club_id===c.id);
  const key='club:'+c.id;
  const ms=CACHE.matches.filter(m=>m.home_team===key||m.away_team===key).sort((a,b)=>b.match_date.localeCompare(a.match_date));
  $('#app').innerHTML=`
   <div class="pagehead">${c.badge?`<img src="${c.badge}" style="width:48px;height:48px;object-fit:contain;border-radius:10px;background:var(--panel2)">`:''}<h1>${esc(c.name)}${c.tier?` <span class="mono" style="font-size:13px;color:var(--muted)">tier ${esc(c.tier)}</span>`:''}</h1><span style="flex:1"></span><button class="btn small" id="cpy">${t('copyLink')}</button>
     ${state.unlocked?`<button class="btn small" id="editCl">✎</button><button class="btn small danger" id="delCl">${t('delete')}</button>`:''}</div>
   <div class="panel"><div class="kv">
     <div><b>${t('country')}</b><span>${c.country?`${flag(c.country)} ${cName(c.country)}`:'—'}</span></div>
     <div><b>${t('city')}</b><span>${c.city?esc(c.city):'—'}</span></div>
     <div><b>${t('clubLevel')}</b><span class="mono">${c.level??'—'}</span></div>
   </div>${c.info?`<p class="pre" style="margin-top:10px">${linkify(esc(c.info))}</p>`:''}</div>
   <div class="panel"><h3>${t('roster')} (${roster.length})</h3><div class="grid">
     ${roster.map(p=>`<a class="card" href="#/player/${p.slug}"><span class="flag">${flag(p.country)}</span>
       <span class="who"><span class="nm">${esc(p.name)}</span><span class="sub">${esc(p.position||'')} ${p.birth_year||''}</span></span></a>`).join('')||'—'}</div></div>
   ${(()=>{const fps=(CACHE.former||[]).filter(f=>f.club_id===c.id).map(f=>({f,p:CACHE.playerById[f.player_id]})).filter(x=>x.p&&x.p.club_id!==c.id);
     return fps.length?`<div class="panel"><h3>${t('formerPlayers')} (${fps.length})</h3><div class="grid">
       ${fps.map(({f,p})=>`<a class="card" href="#/player/${p.slug}"><span class="flag">${flag(p.country)}</span>
        <span class="who"><span class="nm">${esc(p.name)}</span><span class="sub">${esc(p.position||'')} ${p.birth_year||''}${f.period?' · '+esc(f.period):''}${p.club_id&&CACHE.clubById[p.club_id]?` · → ${esc(CACHE.clubById[p.club_id].name)}`:''}</span></span></a>`).join('')}</div></div>`:'';})()}
   <div class="panel"><h3>${t('matchHistory')} (${ms.length})</h3>
     ${ms.map(m=>`<div class="obs"><div class="meta">${fmtDate(m.match_date)}</div>
       <a href="#/match/${m.slug}">${teamDisplay(m.home_team)} vs ${teamDisplay(m.away_team)}</a></div>`).join('')||'—'}</div>`;
  $('#cpy').onclick=()=>{navigator.clipboard.writeText(location.href);toast(t('copied'));};
  const eCl=$('#editCl'); if(eCl) eCl.onclick=()=>clubModal(c);
  const dCl=$('#delCl'); if(dCl) dCl.onclick=async()=>{
    const linked=CACHE.players.some(p=>p.club_id===c.id)||(CACHE.former||[]).some(f=>f.club_id===c.id);
    if(linked){toast(t('cantDeleteClub'));return;}
    if(!confirm(t('confirmDelete')))return;
    await dbDelete('clubs',c.id); nav('#/clubs');
  };
}
